<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeStreak</title>
  <link rel="icon" type="image/png" href="../icons/codestreak-favicon.png" />
  <link rel="stylesheet" href="popup.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="logo-row">
        <img class="logo-icon" src="../icons/codestreak.png" alt="CodeStreak Logo" />
      </div>
      <p class="tagline">Connect. Code. Conquer.</p>
    </div>

    <!-- Status Card -->
    <div class="status-card" id="statusCard">
      <span class="status-text" id="statusText">Not Connected</span>
      <div class="status-indicator" id="statusIndicator">
        <span class="status-dot" id="statusDot"></span>
      </div>
    </div>

    <!-- GitHub User Info (shown when connected) -->
    <div class="user-info hidden" id="userInfo">
      <div class="user-info-header">
        <img class="user-avatar" id="userAvatar" src="" alt="avatar" />
        <div class="user-details">
          <p class="user-name" id="userName"></p>
          <p class="user-login" id="userLogin"></p>
        </div>
      </div>
      
      <div class="user-stats">
        <div class="stat"><span id="userRepos">0</span> <span>Repositories</span></div>
        <div class="stat"><span id="userFollowers">0</span> <span>Followers</span></div>
      </div>
      
      <a href="#" id="viewProfile" target="_blank" class="profile-link">
        View on GitHub
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14L21 3" />
        </svg>
      </a>
    </div>

    <div class="btn-wrapper">
      <!-- Action Button -->
      <button class="btn-github" id="connectBtn">
        <svg class="github-icon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path fill-rule="evenodd" clip-rule="evenodd" d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.294 2.747-1.025 2.747-1.025.546 1.379.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.161 22 16.416 22 12c0-5.523-4.477-10-10-10z"/>
        </svg>
        <span id="connectBtnText">Continue with GitHub</span>
      </button>

      <!-- Disconnect Button (hidden by default) -->
      <button class="btn-disconnect hidden" id="disconnectBtn">
        Disconnect
      </button>
    </div>

    <!-- Footer -->
    <div class="footer">
      <p>Powered by CodeStreak Auth</p>
    </div>
  </div>

  <script src="../utils/api.js"></script>
  <script src="popup.js"></script>
</body>
</html>
